version: '3.8'

services:

  mysql:
    image: mysql:8.0
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: hp_prevision_vm
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  eureka-server:
    build: ./eureka-server
    container_name: eureka-server
    ports:
      - "8761:8761"
    depends_on:
      mysql:
        condition: service_healthy

  prevision:
    build: ./Prevision
    container_name: prevision
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/hp_prevision_vm
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_started

  paciente:
    build: ./Paciente
    container_name: paciente
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/hp_Paciente_vm
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      WEBCLIENT_PREVISION_URL: http://prevision:8081
    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_started
      prevision:
        condition: service_started

  historial-medico:
    build: ./Historial_Medico
    container_name: historial-medico
    ports:
      - "8083:8083"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/hp_Historial_vm
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      WEBCLIENT_PACIENTE_URL: http://paciente:8082
    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_started
      paciente:
        condition: service_started

  factura:
    build: ./Factura
    container_name: factura
    ports:
      - "8084:8084"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/hp_factura_vm
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      WEBCLIENT_PACIENTE_URL: http://paciente:8082
      WEBCLIENT_HOSPITALIZACION_URL: http://hospitalizacion:8282
    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_started
      paciente:
        condition: service_started

  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    ports:
      - "8500:8500"
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
    depends_on:
      eureka-server:
        condition: service_started
      prevision:
        condition: service_started
      paciente:
        condition: service_started
      historial-medico:
        condition: service_started
      factura:
        condition: service_started

volumes:
  mysql_data: